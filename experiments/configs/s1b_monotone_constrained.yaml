# =============================================================================
# S1b — MONOTONE CONSTRAINED
# =============================================================================
# Persona: MONOTONE + non-trivial but reachable absolute thresholds.
# The oracle prefers on utility AND emits the same two constraints every
# iteration (overshoot < 10%, settling < 20 s).
# Purpose: Isolates constraint-handling from preference-model issues.
#          The constraints are satisfiable, so the system should converge
#          while respecting them. Measures how much the constraint channel
#          *helps* vs the unconstrained S1 baseline.
# Expected outcome: Slightly slower convergence than S1 but zero (or near-zero)
#                   cumulative constraint violations once warm-up ends.
# =============================================================================

scenario_id: S1b
persona: MONOTONE_CONSTRAINED
description: >
  Monotone utility preference with mild, always-satisfiable relative constraint
  (no MSE regression vs A). Acts as a constrained baseline alongside S1.

# ── Oracle hyperparameters ────────────────────────────────────────────────────
oracle:
  noise_level: 0.0
  seed: 42
  late_switch_iter: null
  verbose: true

# ── Hidden utility weights ────────────────────────────────────────────────────
utility:
  w_overshoot: 0.1
  w_settling:  0.1
  w_mse:       1.0

# ── Hard thresholds ──────────────────────────────────────────────────────────
thresholds:
  max_overshoot: null
  max_settling:  null
  max_mse:       null

# ── Experiment execution ──────────────────────────────────────────────────────
experiment:
  n_iterations:   20
  n_seeds:        5
  seeds:          [42, 7, 13, 99, 2025]
  warm_start_n:   20
  n_retries:      10

# ── Plant ─────────────────────────────────────────────────────────────────────
plant:
  wn:   1.0
  zeta: 0.7

# ── Parameter search space ───────────────────────────────────────────────────
bounds:
  Kp: [0.1, 5.0]
  Ki: [0.001, 3.0]

# ── Acquisition function ──────────────────────────────────────────────────────
acquisition:
  type: qUCB
  beta: 2.0
  beta_schedule: fixed

# ── Constraint enforcement strategy ──────────────────────────────────────────
constraint_mode: surrogate_mean

# ── Metrics to record ────────────────────────────────────────────────────────
logging:
  metrics:
    - simple_regret
    - cumulative_constraint_violations
    - convergence_iteration
    - preference_alignment_rate
    - feasibility_rate
  output_dir: experiments/results/s1b_monotone_constrained
