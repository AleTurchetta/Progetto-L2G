# =============================================================================
# S6 — DIRECTION ONLY
# =============================================================================
# Persona: The reticent engineer.
# The oracle never reveals a preference label. It only pushes the single
# worst metric toward its target via an absolute upper-bound constraint.
# Each iteration, it computes which metric is furthest above its target
# (relative to the target value) and emits one constraint for that metric only.
#
# Target values (from the DIRECTION_ONLY TargetProfile):
#   - overshoot_pct  target: 5.0 %
#   - settling_time  target: 10.0 s
#   - tracking_mse   target: 0.5
#
# feedback_type is always "direction_only" (or "none" if all metrics are on target).
# The PairwiseGP is never trained — only metric surrogates and constraints evolve.
#
# Purpose: Tests the direction_only code path end-to-end.
#          Verifies that the system can converge toward a target without
#          any pairwise preference signal — relying purely on constraints
#          and the cold-start MSE acquisition function.
# Expected outcome: Slower convergence than preference-based scenarios;
#                   metrics should approach the per-target thresholds over
#                   iterations even without a PairwiseGP.
# =============================================================================

scenario_id: S6
persona: DIRECTION_ONLY
description: >
  No preference label ever emitted. Oracle identifies the worst metric each
  iteration and adds one absolute constraint pushing it toward the target.
  Tests the constraint-only optimisation pathway without a PairwiseGP.

# ── Oracle hyperparameters ────────────────────────────────────────────────────
oracle:
  noise_level: 0.0
  seed: 42
  late_switch_iter: null
  verbose: true

# ── Hidden utility weights (used for utility() call in diagnostics only) ──────
utility:
  w_overshoot: 1.5
  w_settling:  0.5
  w_mse:       1.0

# ── Directional targets (must match DIRECTION_ONLY TargetProfile in oracle.py) ─
thresholds:
  max_overshoot: 5.0        # Target for the overshoot direction
  max_settling:  10.0       # Target for the settling time direction
  max_mse:       0.5        # Target for the MSE direction

# ── Direction-only parameters ─────────────────────────────────────────────────
direction_only:
  selection_rule: worst_relative  # Picks metric with highest (actual - target)/|target|
  emit_n_constraints: 1           # Only the single worst metric per iteration
  constraint_confidence: 0.9

# ── Experiment execution ──────────────────────────────────────────────────────
experiment:
  n_iterations:   10
  n_seeds:        5
  seeds:          [42, 7, 13, 99, 2025]
  warm_start_n:   200
  n_retries:      10

# ── Plant ─────────────────────────────────────────────────────────────────────
plant:
  wn:   1.0
  zeta: 0.7

# ── Parameter search space ───────────────────────────────────────────────────
bounds:
  Kp: [0.1, 5.0]
  Ki: [0.001, 3.0]

# ── Acquisition function ──────────────────────────────────────────────────────
# No PairwiseGP → must use cold-start acqf (qLogEI on MSE surrogate).
acquisition:
  type: qLogEI               # Falls back to this when pref_data is empty
  beta: null                 # Not used for EI
  beta_schedule: null

# ── Constraint enforcement strategy ──────────────────────────────────────────
constraint_mode: surrogate_mean

# ── Diagnostics ───────────────────────────────────────────────────────────────
diagnostics:
  record_which_metric_constrained: true   # Log which metric was selected each iter
  record_metric_trajectories: true        # Log overshoot/settling/MSE per iteration

# ── Metrics to record ────────────────────────────────────────────────────────
logging:
  metrics:
    - simple_regret
    - cumulative_constraint_violations
    - convergence_iteration
    - feasibility_rate
    - avg_retries_per_iteration
    - metric_trajectory_overshoot    # Extra: track each metric independently
    - metric_trajectory_settling
    - metric_trajectory_mse
  output_dir: experiments/results/s6_direction_only
