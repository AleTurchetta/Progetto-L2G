# =============================================================================
# S7 — LATE SWITCHER
# =============================================================================
# Persona: The preference-reverser.
# For the first `late_switch_iter - 1` iterations the oracle behaves exactly
# like S1 MONOTONE. At iteration `late_switch_iter` it calls _flip_weights()
# once, swapping overshoot/MSE weights and doubling settling weight.
# Purpose: Tests recovery from a mid-run preference reversal.
# Expected outcome: Temporary increase in Simple Regret after the switch;
#                   eventual convergence toward the post-flip optimum.
# =============================================================================

scenario_id: S7
persona: LATE_SWITCHER
description: >
  Consistent MSE-dominant preferences for first 3 iterations, then a
  one-time weight swap shifts priority to tracking over settling time.
  Tests the PairwiseGP's ability to recover from a mid-run preference reversal.

# ── Oracle hyperparameters ────────────────────────────────────────────────────
oracle:
  noise_level: 0.0
  seed: 42
  late_switch_iter: 4       # Flip occurs AT the start of iteration 4
  verbose: true

# ── Hidden utility weights ────────────────────────────────────────────────────
# Pre-switch (iters 1–3): overshoot-dominant
utility:
  w_overshoot: 2.0
  w_settling:  0.2
  w_mse:       0.5

# Post-switch weights (computed inside oracle._flip_weights()):
#   w_overshoot ↔ w_mse  → w_overshoot=0.5, w_mse=2.0
#   w_settling  *= 2     → w_settling=0.4
utility_post_switch:
  w_overshoot: 0.5
  w_settling:  0.4
  w_mse:       2.0

# ── Hard thresholds ───────────────────────────────────────────────────────────
thresholds:
  max_overshoot: null
  max_settling:  null
  max_mse:       null

# ── Experiment execution ──────────────────────────────────────────────────────
experiment:
  n_iterations:   30
  n_seeds:        5
  seeds:          [42, 7, 13, 99, 2025]
  warm_start_n:   20
  n_retries:      10

# ── Plant ─────────────────────────────────────────────────────────────────────
plant:
  wn:   1.0
  zeta: 0.7

# ── Parameter search space ───────────────────────────────────────────────────
bounds:
  Kp: [0.1, 5.0]
  Ki: [0.001, 3.0]

# ── Acquisition function ──────────────────────────────────────────────────────
acquisition:
  type: qUCB
  beta: 2.0
  beta_schedule: fixed

# ── Constraint enforcement strategy ──────────────────────────────────────────
constraint_mode: surrogate_mean

# ── Recovery diagnostics ──────────────────────────────────────────────────────
recovery_analysis:
  switch_iteration: 4
  record_pre_switch_best: true
  record_post_switch_trajectory: true

# ── Metrics to record ────────────────────────────────────────────────────────
logging:
  metrics:
    - simple_regret
    - cumulative_constraint_violations
    - convergence_iteration
    - preference_alignment_rate
    - feasibility_rate
    - simple_regret_pre_switch
    - simple_regret_post_switch
    - recovery_iterations
  output_dir: experiments/results/s7_late_switcher
