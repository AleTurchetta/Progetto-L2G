# =============================================================================
# S7 — LATE SWITCHER
# =============================================================================
# Persona: The preference-reverser.
# For the first `late_switch_iter - 1` iterations the oracle behaves exactly
# like S1 MONOTONE (pure utility, no constraints). At iteration
# `late_switch_iter` it calls _flip_weights() once, which:
#   - Swaps w_overshoot and w_mse  (0.5 → 1.0 and 1.0 → 0.5, post-flip)
#   - Doubles w_settling            (0.2 → 0.4, post-flip)
# After the flip the oracle's preferences reverse, favouring low settling
# time over low MSE. The flip happens exactly once and is silent to the BO system.
#
# Initial TargetProfile (iterations 1 → late_switch_iter-1):
#   w_overshoot = 2.0, w_settling = 0.2, w_mse = 0.5
# Post-flip TargetProfile (iterations late_switch_iter → end):
#   w_overshoot = 0.5, w_settling = 0.4, w_mse = 2.0
#
# Purpose: Tests recovery from a mid-run preference reversal.
#          The PairwiseGP accumulates consistent data in early iters,
#          then receives contradicting signal after the switch.
#          Measures how quickly the model recovers ("catastrophic forgetting"
#          vs. graceful re-weighting).
# Expected outcome: Temporary increase in Simple Regret after the switch
#                   (detectable in per-seed plots); eventual convergence
#                   toward the post-flip optimum if recovery works.
# =============================================================================

scenario_id: S7
persona: LATE_SWITCHER
description: >
  Consistent MSE-dominant preferences for first 3 iterations, then a
  one-time weight swap shifts priority to tracking over settling time.
  Tests the PairwiseGP's ability to recover from a mid-run preference reversal.

# ── Oracle hyperparameters ────────────────────────────────────────────────────
oracle:
  noise_level: 0.0
  seed: 42
  late_switch_iter: 4       # Flip occurs AT the start of iteration 4
  verbose: true             # Prints "[Oracle] LATE SWITCH: weights flipped"

# ── Hidden utility weights ────────────────────────────────────────────────────
# Pre-switch (iters 1–3): overshoot-dominant
utility:
  w_overshoot: 2.0
  w_settling:  0.2
  w_mse:       0.5

# Post-switch weights (computed inside oracle._flip_weights()):
#   w_overshoot ↔ w_mse  → w_overshoot=0.5, w_mse=2.0
#   w_settling  *= 2     → w_settling=0.4
# These are documented here for reference; oracle.py computes them internally.
utility_post_switch:
  w_overshoot: 0.5          # (read-only reference — not parsed by oracle)
  w_settling:  0.4
  w_mse:       2.0

# ── Hard thresholds ───────────────────────────────────────────────────────────
thresholds:
  max_overshoot: null
  max_settling:  null
  max_mse:       null

# ── Experiment execution ──────────────────────────────────────────────────────
experiment:
  n_iterations:   10        # Needs >= late_switch_iter + a few post-switch iters
  n_seeds:        5
  seeds:          [42, 7, 13, 99, 2025]
  warm_start_n:   200
  n_retries:      10

# ── Plant ─────────────────────────────────────────────────────────────────────
plant:
  wn:   1.0
  zeta: 0.7

# ── Parameter search space ───────────────────────────────────────────────────
bounds:
  Kp: [0.1, 5.0]
  Ki: [0.001, 3.0]

# ── Acquisition function ──────────────────────────────────────────────────────
acquisition:
  type: qUCB
  beta: 3.0
  beta_schedule: fixed

# ── Constraint enforcement strategy ──────────────────────────────────────────
constraint_mode: surrogate_mean

# ── Recovery diagnostics ──────────────────────────────────────────────────────
recovery_analysis:
  switch_iteration: 4                 # Mirror of late_switch_iter for analysis scripts
  record_pre_switch_best: true        # Save best candidate at iter 3 for comparison
  record_post_switch_trajectory: true # Track regret separately after the switch

# ── Metrics to record ────────────────────────────────────────────────────────
logging:
  metrics:
    - simple_regret
    - cumulative_constraint_violations
    - convergence_iteration
    - preference_alignment_rate
    - feasibility_rate
    - simple_regret_pre_switch        # Extra: regret for iters 1 → switch_iter-1
    - simple_regret_post_switch       # Extra: regret for iters switch_iter → end
    - recovery_iterations             # Extra: iters needed to return to pre-switch regret
  output_dir: experiments/results/s7_late_switcher
